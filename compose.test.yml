services:
  redis:
    image: redis:5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 512M
    container_name: rate-limiter-redis-test
    hostname: rate-limiter-redis-test
    volumes:
      - "rate-limiter-redis-test:/data"
    ports:
      - "6379:6379"
    networks:
      - rate-limiter-test-network

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      - redis
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    networks:
      - rate-limiter-test-network

volumes:
  rate-limiter-redis-test:

networks:
  rate-limiter-test-network: